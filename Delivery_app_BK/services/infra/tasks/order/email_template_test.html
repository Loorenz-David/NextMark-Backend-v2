<!-- ===== Email Wrapper ===== -->
    <style>
      @media only screen and (max-width: 620px) {
        .email-wrapper {
          background-color: transparent !important;
        }

        .email-outer-cell {
          padding: 0 12px !important;
        }

        .email-container {
          width: 100% !important;
          max-width: 100% !important;
        }

        .email-spacer {
          height: 12px !important;
          font-size: 12px !important;
          line-height: 12px !important;
        }
      }
    </style>
    <table
      class="email-wrapper"
      width="100%"
      cellpadding="0"
      cellspacing="0"
      role="presentation"
      style="width:100%; background-color:transparent;"
    >
      <tbody>
        <!-- TOP SPACER -->
        <tr>
          <td class="email-spacer" height="24" style="font-size:24px; line-height:24px;">
            &nbsp;
          </td>
        </tr>
        <tr>
          <td class="email-outer-cell" align="center">

            <!-- ===== Container (600px) ===== -->
            <table
              class="email-container"
              width="600"
              cellpadding="0"
              cellspacing="0"
              role="presentation"
              style="
                width:600px;
                max-width:600px;
                background-color:#ffffff;
                font-family:Arial, Helvetica, sans-serif;
                color:#111111;
                border-radius:12px;
                border:1px solid #e5e5e5;
                overflow:hidden;
              "
            >
              <tbody>
                <!-- ===== logo  ===== -->
                 <tr>
                  <td
                    style="
                      padding:0; line-height:0; text-align:center;
                    "
                  >
                    <!-- SLATE: body -->
                        <img src="https://beyovintage-public.s3.eu-north-1.amazonaws.com/icons+and+bacgrounds/beyo-layout-icon.png" 
                            alt="Company Logo" 
                          width="600"
                          style="display:block; margin:0 auto; width:100%; max-width:600px; height:auto;" 
                        />
                  </td>
                </tr>

                <!-- ===== Header Slot ===== -->
                <tr>
                  <td
                    style="
                        padding-top:24px;
                        padding-left:32px;
                        padding-right:32px; 
                        padding-bottom:10px;

                        font-size:24px;
                        font-weight:semi-bold;
                        color:#5a5a5a;
                    "
                  >
                    <!-- SLATE: header -->
                     {{HEADER_CONTENT}}
                  </td>
                </tr>

                <!-- ===== Body Slot ===== -->
                <tr>
                  <td
                    style="
                      padding:32px;
                      line-height:1.6;
                      font-size:15px;
                      border-bottom:1px solid #e5e5e5;
                    "
                  >
                    <!-- SLATE: body -->
                     {{BODY_CONTENT}}
                  </td>
                </tr>

                <!-- ===== Footer Slot ===== -->
                 <!-- SLATE: footer -->

                 <!-- Padding top  -->
                   <tr>
                        <td
                            style="
                                padding:10px 32px; line-height:1.6; text-align:center;
                            "
                        >
                           
                        </td>
                    </tr>
                <!-- --------------------- -->


                <tr>
                        <td
                            style="
                                padding:10px 32px; line-height:1.6; text-align:center;
                            "
                        >
                            {{FOOTER_BUTTONS}}
                           
                        </td>
                        
                         
                    </tr>
                    


                    <!-- Padding bottom footer  -->
                    <tr>
                        <td
                            style="
                                padding:10px 32px; line-height:1.6; text-align:center;
                            "
                        >
                           
                        </td>
                    </tr>
                    <!-- --------------------- -->
               
                
                

              </tbody>
            </table>
            <!-- ===== /Container ===== -->

          </td>
        </tr>

        <!-- BOTTOM SPACER -->
        <tr>
          <td class="email-spacer" height="24" style="font-size:24px; line-height:24px;">
            &nbsp;
          </td>
        </tr>

      </tbody>
    </table>
